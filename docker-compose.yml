services:
  vrising:
    image: dmirtillo/vrising-dedicated
    environment:
      - TZ=Europe/Rome
      - SERVERNAME=vrising-dedicated
      - WINEDEBUG=fixme-all
      - PUID=1000
      - PGID=1000
    volumes:
      - type: bind
        source: /your/host/vrising/server
        target: /mnt/vrising/server
        bind:
          create_host_path: true
      - type: bind
        source: /your/host/vrising/persistentdata
        target: /mnt/vrising/persistentdata
        bind:
          create_host_path: true
    ports:
      - '9876:9876/udp'
      - '9877:9877/udp'
    healthcheck:
      test: ["CMD-SHELL", "nc -z -u 127.0.0.1 $${QUERYPORT:-9877} || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 3
    restart: unless-stopped
    network_mode: bridge
